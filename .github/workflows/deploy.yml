name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full git history so scripts/build-sitemap.js can read each file's
          # last commit date via `git log -1 --format=%cI`.
          fetch-depth: 0
      - name: Replace __VERSION__ with commit SHA (cache bust)
        run: |
          VERSION="${GITHUB_SHA::7}"
          echo "Stamping assets with VERSION=$VERSION"
          grep -rl '__VERSION__' --include='*.html' . | xargs sed -i "s/__VERSION__/$VERSION/g"
      # Strips the inactive mode block (and writes index.preview.html with
      # both sections + noindex) based on SITE_MODE in site.config.js. With
      # SITE_MODE="launched" this removes #prelaunch-content so the deployed
      # HTML has one <h1> and no "Kommer snart" signals for crawlers.
      - name: Strip inactive mode block from index.html
        run: node scripts/build-modes.js
      - name: Build blog RSS feed
        run: node scripts/build-feed.js
      - name: Build legal RSS feeds
        run: node scripts/build-legal-feeds.js
      - name: Build sitemap
        run: node scripts/build-sitemap.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
